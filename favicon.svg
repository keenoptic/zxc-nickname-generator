<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b5db6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#522c52;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c56dd6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b5db6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="16" cy="16" r="14" fill="url(#bgGrad)" opacity="0.95"/>
  
  <!-- Cloud wave pattern in purple tones -->
  <path d="M 6 18 Q 10 12, 14 18 T 22 18 T 26 14" 
        stroke="url(#cloudGrad)" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round"
        filter="url(#glow)"/>
  
  <!-- ZXC text in bright purple with glow -->
  <text x="16" y="21" 
        font-family="monospace" 
        font-weight="bold" 
        font-size="11" 
        text-anchor="middle" 
        fill="#c56dd6"
        filter="url(#innerGlow)"
        style="text-shadow: 0 0 3px #9b5db6;">ZXC</text>
</svg>
